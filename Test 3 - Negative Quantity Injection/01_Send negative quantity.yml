info:
  name: 01_Send negative quantity
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/orders"
  body:
    type: json
    data: |-
      {
        "itemId": 1,
        "quantity": -3
      }
  auth:
    type: bearer
    token: "{{myBearerToken}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
