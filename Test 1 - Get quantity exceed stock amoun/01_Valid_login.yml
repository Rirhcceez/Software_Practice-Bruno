info:
  name: 01_Valid_login
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/auth/login"
  body:
    type: json
    data: |-
      {
        "username": "student",
        "password": "hungry"
      }
  auth:
    type: bearer
    token: "{{myBearerToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        if (data && data.accessToken) {
          bru.setEnvVar("myBearerToken", data.accessToken);
          console.log("Token saved successfully!"); 
        }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
