info:
  name: 02_Get_stock_update
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/menu"
  auth:
    type: bearer
    token: "{{myBearerToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        if (data) {
          bru.setEnvVar("stockUpdate", data[0].stock); 
        }
  assertions:
    - expression: stockUpdate
      operator: eq
      value: "1"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
