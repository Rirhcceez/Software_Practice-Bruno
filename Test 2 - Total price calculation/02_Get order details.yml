info:
  name: 02_Get order details
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/orders/{{orderId}}"
  auth:
    type: bearer
    token: "{{myBearerToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        if (data) {
          bru.setEnvVar("totalPrice", data.totalPrice); 
        }
  assertions:
    - expression: totalPrice
      operator: eq
      value: "50"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
